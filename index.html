<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Total Planner - Style Pop Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --zts-blue: #0047AB; /* Bleu sport inspiré de ton image */
            --zts-yellow: #FFD700; /* Jaune vif pour les accents */
            --zts-black: #1A1A1A;
        }

        body {
            background-color: var(--zts-blue);
            /* Texture de points demi-teinte (Halftone) inspirée de Background 2.png */
            background-image: radial-gradient(rgba(0,0,0,0.2) 15%, transparent 16%);
            background-size: 20px 20px;
            font-family: 'Oswald', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* En-tête avec effet de profondeur 3D Comic */
        .header-comic {
            background: var(--zts-yellow);
            color: var(--zts-black);
            border: 6px solid var(--zts-black);
            transform: skew(-5deg) rotate(-1deg);
            box-shadow: 10px 10px 0px var(--zts-black);
            margin: 20px;
            padding: 20px;
        }

        /* Zones de dépôt (Périodes) */
        .drop-zone {
            background: rgba(255, 255, 255, 0.1);
            border: 3px dashed var(--zts-yellow);
            border-radius: 10px;
            height: 100px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .drop-zone:hover {
            background: rgba(255, 215, 0, 0.2);
            border-style: solid;
        }

        /* Ballons de groupes physiques */
        .ballon-groupe {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid var(--zts-black);
            background: var(--zts-yellow);
            color: var(--zts-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.3);
            cursor: grab;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="relative z-10 p-4">
        <header class="header-comic text-center">
            <h1 class="text-5xl font-bangers tracking-wider">ZONE TOTAL PLANNER</h1>
            <p class="text-xl">Vibe: Pop Art Sports </p>
        </header>

        <div class="grid grid-cols-5 gap-6 mt-10 px-10">
            <div class="day-column bg-white/5 p-4 border-l-4 border-yellow-400">
                <h2 class="text-3xl font-bangers text-yellow-400 mb-6 uppercase">Lundi</h2>
                <div class="drop-zone" data-periode="1">Période 1</div>
                <div class="drop-zone" data-periode="2">Période 2</div>
                <div class="drop-zone" data-periode="3">Période 3</div>
            </div>
            </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        // Limites
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 30, window.innerWidth, 60, { isStatic: true });
        Composite.add(world, ground);

        // Créer les ballons interactifs
        const groups = ['101', '202', '303', '404', '505'];
        groups.forEach((id, i) => {
            const ball = Bodies.circle(100 + (i * 100), 50, 35, { restitution: 0.6 });
            const el = document.createElement('div');
            el.className = 'ballon-groupe';
            el.innerText = id;
            document.body.appendChild(el);
            ball.element = el;
            Composite.add(world, ball);
        });

        (function run() {
            const bodies = Composite.allBodies(world);
            bodies.forEach(b => {
                if(b.element) {
                    b.element.style.left = `${b.position.x - 35}px`;
                    b.element.style.top = `${b.position.y - 35}px`;
                    b.element.style.transform = `rotate(${b.angle}rad)`;
                }
            });
            Engine.update(engine);
            requestAnimationFrame(run);
        })();

        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: Mouse.create(document.body),
            constraint: { stiffness: 0.2 }
        });
        Composite.add(world, mouseConstraint);
    </script>
</body>
</html>
